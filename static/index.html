<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>财配台 · 工具总面板</title>
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="home">
  <div class="wrap">
    <header class="home-header">
      <div class="home-header__titles">
        <h1>财配台 FinMatch</h1>
        <p class="sub">选择下方功能进入对应页面。后续会在此陆续接入更多财务工具。</p>
      </div>
    </header>

    <div class="tool-grid">
      <a class="tool-card tool-card--reconcile" href="/monthly-statement">
        <span class="tool-card__icon" role="img" aria-label="对账">🧾</span>
        <div class="tool-card__body">
          <h2>月度对账单</h2>
          <p>上传出入库与账单，自动汇总、比对并下载结果。</p>
        </div>
      </a>
      <a class="tool-card tool-card--amazon" href="http://8.218.58.28:6565/" target="_blank" rel="noopener noreferrer">
        <span class="tool-card__icon" role="img" aria-label="包裹与报表">📦</span>
        <div class="tool-card__body">
          <h2>Amazon Summary 解析</h2>
          <p>上传 Summary 压缩包或多份 PDF，解析并生成 Excel（独立服务，新标签页打开）。</p>
        </div>
      </a>
      <a class="tool-card tool-card--ebay" href="http://8.218.58.28:6565/ebay-finance?job=a9bca88b4dd0474c8da5f167a940bc7d" target="_blank" rel="noopener noreferrer">
        <span class="tool-card__icon" role="img" aria-label="财务图表">📊</span>
        <div class="tool-card__body">
          <h2>eBay 财务报告解析</h2>
          <p>上传财务报告 PDF 压缩包或多文件，维护汇率后解析并导出 Excel（独立服务，新标签页打开）。</p>
        </div>
      </a>
      <a class="tool-card tool-card--customs" href="http://8.218.58.28:8008/" target="_blank" rel="noopener noreferrer">
        <span class="tool-card__icon" role="img" aria-label="报关与单证">🛃</span>
        <div class="tool-card__body">
          <h2>报关单核销台账系统</h2>
          <p>按公司管理报关单、发票与核销关系，支持导入、重算与台账导出（独立服务，新标签页打开）。</p>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
